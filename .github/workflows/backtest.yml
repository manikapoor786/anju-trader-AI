name: 🧪 Backtest

# Walk-forward backtest of anju-AI scoring against historical bhavcopy.
# Reads historical.db from the Actions cache populated by backfill_history.yml.
# If the cache is empty, the backtest will fall back to yfinance and run slowly.

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2024-05-14"
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2026-05-14"
      universe:
        description: "Universe"
        required: true
        default: "nifty500"
        type: choice
        options: [nifty50, nifty100, nifty180, midcap, nifty500, nifty750, microcap250]
      mode:
        description: "Scoring mode"
        required: true
        default: "strict"
        type: choice
        options: [strict, aggressive]
      min_score:
        description: "Min score threshold (6=Trending, 4=Sideways, 8=Volatile, 9=Bear)"
        required: true
        default: "6"
      max_open:
        description: "Max open positions"
        required: true
        default: "15"
      max_hold:
        description: "Max trading days to hold before TIME_EXIT"
        required: true
        default: "90"

env:
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Kolkata"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write   # to persist memory.db (with backtest_runs row)

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Restore historical.db from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/historical.db
            data/historical.db-shm
            data/historical.db-wal
          key: historical-db
          restore-keys: |
            historical-db-

      - name: Verify historical data
        run: |
          python - <<'PY'
          from pathlib import Path
          from anju_core.data_layer import _resolve_db_path, _print_stats
          p = _resolve_db_path()
          if not p.exists():
              print(f"⚠️  No historical.db at {p}")
              print("    Trigger Backfill Historical Data workflow first, or")
              print("    backtest will fall back to slow yfinance per-symbol calls.")
          else:
              _print_stats()
          PY

      - name: Secrets to .env
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN_AI }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID_AI }}"     >> .env

      - name: Run backtest
        run: |
          python -m anju_ai.loops.backtest_run \
            --start "${{ inputs.start_date }}" \
            --end "${{ inputs.end_date }}" \
            --universe "${{ inputs.universe }}" \
            --mode "${{ inputs.mode }}" \
            --min-score "${{ inputs.min_score }}" \
            --max-open "${{ inputs.max_open }}" \
            --max-hold "${{ inputs.max_hold }}"

      - name: Persist memory.db + trade artifacts
        run: |
          git config user.name  "anju-AI-bot"
          git config user.email "anju-AI-bot@users.noreply.github.com"
          git add data/memory.db data/backtests/*.trades.json || true
          git diff --staged --quiet || git commit -m "data: backtest run [skip ci]"
          git push || true
