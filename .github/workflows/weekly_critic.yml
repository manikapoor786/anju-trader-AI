name: 📋 Weekly Critic (Claude)

# Sunday 9:00 AM IST. Reviews the past week with Claude Sonnet
# (the ONLY paid LLM use — every other loop uses Gemini free tier).
# Cost: ~₹5-10/week.

on:
  schedule:
    # 9 AM IST Sunday = 3:30 UTC Sunday
    - cron: "30 3 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print input, skip LLM call"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Kolkata"

jobs:
  critic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - name: Secrets to .env
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN_AI }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID_AI }}"     >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"      >> .env
      - name: Run weekly critic
        run: |
          DRY=""
          if [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then DRY="--dry-run"; fi
          python -m anju_ai.loops.weekly_critic $DRY
      - name: Persist memory.db
        run: |
          git config user.name  "anju-AI-bot"
          git config user.email "anju-AI-bot@users.noreply.github.com"
          git add data/memory.db || true
          git diff --staged --quiet || git commit -m "chore: weekly critic $(date -u +'%Y-%m-%d') [skip ci]"
          git push || true
